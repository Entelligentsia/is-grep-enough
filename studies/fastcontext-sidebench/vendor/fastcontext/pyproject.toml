[project]
name = "fastcontext"
version = "0.1.0"
description = "FastContext explore MCP — vendored, trimmed to the explore server only."
requires-python = ">=3.12,<4.0"

# Only what the MCP explore path imports. `mcp` is injected at runtime via
# `uv run --with mcp` (see fc-vendored-mcp.json), so it is not pinned here.
dependencies = [
    "aiofiles>=25.1.0",
    "jinja2>=3.1.6",
    "openai>=2.15.0",
    "pydantic>=2.12.5",
]

[build-system]
requires = ["uv_build>=0.9.2,<0.10.0"]
build-backend = "uv_build"
